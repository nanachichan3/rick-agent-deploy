version: '3.8'

services:
  rick:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/nanachichan3/rick-agent-deploy:latest
    container_name: factory-rick
    restart: unless-stopped
    volumes:
      - rick-data:/root/.openclaw
    environment:
      - RICK_MODEL=${RICK_MODEL:-minimax/minimax-m2.7}
      - RICK_INFERENCE_PROVIDER=${RICK_INFERENCE_PROVIDER:-openrouter}
      - RICK_GATEWAY_PORT=${RICK_GATEWAY_PORT:-18791}
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS:-588858125126336544,1484966987321835733}
      - "DISCORD_REQUIRE_MENTION=${DISCORD_REQUIRE_MENTION:-false}"
      - DISCORD_FREE_RESPONSE_CHANNELS=${DISCORD_FREE_RESPONSE_CHANNELS:-1489982401445888000,1489982424594251920,1484900474363842643}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-https://zpcahptj6ryfiti37abe0ind.qed.quest}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - WORKSPACE_GIT_URL=${WORKSPACE_GIT_URL:-}
      - WORKSPACE_GIT_REF=${WORKSPACE_GIT_REF:-main}
      - WORKSPACE_GIT_TOKEN=${WORKSPACE_GIT_TOKEN:-}
    ports:
      - "18791:18791"

volumes:
  rick-data:
    driver: local
